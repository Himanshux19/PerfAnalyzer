<!-- Runner Navigation Header -->
<header class="navbar-runner px-4 py-2 border-bottom bg-white d-flex align-items-center justify-content-between">
  <!-- Brand / Logo -->
  <div class="d-flex align-items-center gap-2">
    <span class="runner-brand-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
      </svg>
    </span>
    <span class="runner-brand-text">PerfAnalyzer</span>
  </div>

  <!-- Center Nav Links -->
  <nav class="runner-nav-links">
    <ul class="d-flex align-items-center gap-4 list-unstyled m-0">
      <li><a class="runner-nav-item"><i class="bi bi-house me-2"></i>Dashboard</a></li>
      <li><a class="runner-nav-item active"><i class="bi bi-check-circle me-2"></i>Tests</a></li>
      <li><a class="runner-nav-item"><i class="bi bi-file-earmark-bar-graph me-2"></i>Reports</a></li>
      <li><a class="runner-nav-item"><i class="bi bi-gear me-2"></i>Configurations</a></li>
      <li><a class="runner-nav-item"><i class="bi bi-calendar3 me-2"></i>Schedule</a></li>
    </ul>
  </nav>

  <!-- Right Profile / Controls -->
  <div class="d-flex align-items-center gap-3">
    <div class="user-circle-initials font-semibold">{{ getInitials() }}</div>
    <span class="text-muted d-none d-md-inline font-semibold" style="font-size: 0.85rem;">{{ getUsername() }}</span>
    <button type="button" class="btn btn-outline-danger btn-sm d-flex align-items-center gap-1.5 font-bold ms-2" (click)="onLogout()" title="Log Out" style="font-size: 0.725rem; padding: 4px 10px; border-radius: 6px;">
      <i class="bi bi-box-arrow-right"></i> LOG OUT
    </button>
  </div>
</header>
