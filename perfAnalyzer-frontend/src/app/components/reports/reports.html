<!-- Runner Real-Time Metrics & Charts -->
<div class="metrics-runner-section">
  <div class="card-title-premium-runner mb-3">REAL-TIME TEST METRICS</div>
  
  <div class="row g-4">
    <!-- 4 Metric Scorecards Grid -->
    <div class="col-lg-5 col-md-6 col-12">
      <div class="row g-3">
        <!-- Active Users -->
        <div class="col-6">
          <div class="card-premium p-4 d-flex flex-column align-items-center justify-content-center text-center">
            <div class="runner-kpi-label">ACTIVE USERS</div>
            <div class="runner-kpi-val">{{ api.users() || 0 }}</div>
          </div>
        </div>
        <!-- Throughput -->
        <div class="col-6">
          <div class="card-premium p-4 d-flex flex-column align-items-center justify-content-center text-center">
            <div class="runner-kpi-label">AVG. THROUGHPUT (RPS)</div>
            <div class="runner-kpi-val">{{ api.runnerAvgRps() }}</div>
            <div class="runner-kpi-sub">(Peak : {{ api.runnerRps() }})</div>
          </div>
        </div>
        <!-- Avg RT -->
        <div class="col-6">
          <div class="card-premium p-4 d-flex flex-column align-items-center justify-content-center text-center">
            <div class="runner-kpi-label">AVG. RESPONSE TIME</div>
            <div class="runner-kpi-val">{{ api.runnerAvgRt() }}</div>
          </div>
        </div>
        <!-- Error Rate -->
        <div class="col-6">
          <div class="card-premium p-4 d-flex flex-column align-items-center justify-content-center text-center">
            <div class="runner-kpi-label">ERROR RATE</div>
            <div class="runner-kpi-val">{{ api.runnerErrorRate() }}</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Throughput RPS Over Time -->
    <div class="col-lg-3 col-md-6 col-12">
      <div class="card-premium p-3 d-flex flex-column">
        <div class="runner-chart-header mb-3">
          <div class="runner-chart-title">Throughput (RPS) over Time</div>
        </div>
        <div class="flex-grow-1 d-flex align-items-center justify-content-center">
          <svg viewBox="0 0 255 115" class="svg-graph">
            <line x1="35" y1="10" x2="245" y2="10" class="graph-grid" />
            <line x1="35" y1="50" x2="245" y2="50" class="graph-grid" />
            <line x1="35" y1="90" x2="245" y2="90" class="graph-grid" />
            <text x="28" y="14" class="graph-axis-text text-right">{{ getRpsMax() }}</text>
            <text x="28" y="54" class="graph-axis-text text-right">{{ getRpsMiddle() }}</text>
            <text x="28" y="94" class="graph-axis-text text-right">0</text>
            
            <text x="35" y="105" class="graph-axis-text text-center">{{ getLeftTimeLabel() }}</text>
            <text x="105" y="105" class="graph-axis-text text-center">{{ getMiddle1TimeLabel() }}</text>
            <text x="175" y="105" class="graph-axis-text text-center">{{ getMiddle2TimeLabel() }}</text>
            <text x="245" y="105" class="graph-axis-text text-center">{{ getRightTimeLabel() }}</text>

            <!-- Dynamic RPS Line -->
            <path [attr.d]="getRpsPath()" fill="none" stroke="#2563eb" stroke-width="2" />
            
            @if (api.rpsHistory().length === 0) {
              <text x="140" y="54" class="chart-empty-overlay text-center">Awaiting execution...</text>
            }
          </svg>
        </div>
      </div>
    </div>

    <!-- Response Time (ms) & Errors -->
    <div class="col-lg-4 col-md-12 col-12">
      <div class="card-premium p-3 d-flex flex-column">
        <div class="runner-chart-header mb-3 d-flex justify-content-between align-items-center">
          <div class="runner-chart-title">Response Time (ms) & Errors</div>
          <div class="d-flex gap-2 runner-chart-legend">
            <span class="legend-item"><span class="legend-dot bg-blue-dot"></span>Avg. RT</span>
            <span class="legend-item"><span class="legend-dot bg-red-dot"></span>Errors</span>
          </div>
        </div>
        <div class="flex-grow-1 d-flex align-items-center justify-content-center">
          <svg viewBox="0 0 255 115" class="svg-graph">
            <line x1="35" y1="10" x2="245" y2="10" class="graph-grid" />
            <line x1="35" y1="50" x2="245" y2="50" class="graph-grid" />
            <line x1="35" y1="90" x2="245" y2="90" class="graph-grid" />
            <text x="28" y="14" class="graph-axis-text text-right">{{ getRtMax() }}</text>
            <text x="28" y="54" class="graph-axis-text text-right">{{ getRtMiddle() }}</text>
            <text x="28" y="94" class="graph-axis-text text-right">0</text>
            
            <text x="35" y="105" class="graph-axis-text text-center">{{ getLeftTimeLabel() }}</text>
            <text x="105" y="105" class="graph-axis-text text-center">{{ getMiddle1TimeLabel() }}</text>
            <text x="175" y="105" class="graph-axis-text text-center">{{ getMiddle2TimeLabel() }}</text>
            <text x="245" y="105" class="graph-axis-text text-center">{{ getRightTimeLabel() }}</text>

            <!-- Dynamic RT Line (blue) & Error Line (red) -->
            <path [attr.d]="getRtPath()" fill="none" stroke="#3b82f6" stroke-width="2" />
            <path [attr.d]="getErrorPath()" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3" />

            @if (api.rtHistory().length === 0) {
              <text x="140" y="54" class="chart-empty-overlay text-center">Awaiting execution...</text>
            }
          </svg>
        </div>
      </div>
    </div>
  </div>
</div>
