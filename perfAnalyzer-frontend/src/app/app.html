<div class="runner-layout bg-light-gray-slate min-vh-100 pb-5">
  <!-- Topbar Header -->
  <app-navbar></app-navbar>

  <!-- Main Container -->
  <div class="container-fluid py-4 px-lg-5">
    <!-- Upper Section Grid (Test Setup, Run Control, logs console) -->
    <div class="row g-4 mb-4">
      <!-- 1. Test Setup Configuration Card (col-lg-4: 33.3%) -->
      <div class="col-lg-4">
        <app-test-config></app-test-config>
      </div>

      <!-- 2. Central Run Test Trigger Card (Reduced to col-lg-3: 25%) -->
      <div class="col-lg-3">
        <div class="card-premium d-flex flex-column align-items-center justify-content-center p-4 h-100 text-center run-test-container-card">
          <!-- Play Button (Decreased padding) -->
          <button class="btn-run-massive py-2.5 px-4 mb-3" (click)="onRunTest()" [disabled]="api.testStatus() === 'running'">
            @if (api.testStatus() === 'running') {
              <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true" style="width: 1rem; height: 1rem;"></span>
              RUNNING...
            } @else {
              <i class="bi bi-play-fill me-2 fs-5"></i> RUN TEST
            }
          </button>

          <!-- Generate Report Button -->
          @if (api.csvServerName()) {
            <button class="btn btn-outline-primary btn-xs px-3 py-2 mb-3 d-flex align-items-center gap-2 font-semibold" (click)="onGenerateReport()">
              <i class="bi bi-file-earmark-bar-graph"></i> GENERATE HTML REPORT
            </button>
          }
          
          <div class="run-test-status-info">
            <div class="status-desc text-muted mb-1 font-normal fs-status">Currently Running:</div>
            <div class="status-details font-bold text-truncate max-w-160">
              @if (api.testStatus() === 'running') {
                <span class="text-primary fs-status">{{ api.jmxFileName() }}</span>
              } @else if (api.testStatus() === 'success') {
                <span class="text-success fs-status">Idle (Succeeded)</span>
              } @else if (api.testStatus() === 'error') {
                <span class="text-danger fs-status">Idle (Failed)</span>
              } @else {
                <span class="text-muted fs-status">No test running</span>
              }
            </div>
          </div>
        </div>
      </div>

      <!-- 3. Live Logs Terminal (Increased to col-lg-5: 41.7%) -->
      <div class="col-lg-5">
        <app-logs></app-logs>
      </div>
    </div>

    <!-- Bottom Real-Time Test Metrics (Scorecards & SVG Charts) -->
    <div class="mt-4">
      <app-reports></app-reports>
    </div>
  </div>
</div>
